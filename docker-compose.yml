version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zyrstar_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: zyrstar_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zyrstar_user -d zyrstar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zyrstar-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://zyrstar_user:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/zyrstar_db
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - zyrstar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - zyrstar-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - zyrstar-net

networks:
  zyrstar-net:
    driver: bridge

volumes:
  pgdata:
